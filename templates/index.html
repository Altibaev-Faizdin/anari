<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f0f0f,#1c1c1c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:900px;
background:rgba(30,30,30,0.9);
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(255,0,0,0.3);
}

.title{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

.song{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-radius:12px;
margin-bottom:15px;
background:#202020;
transition:0.3s;
}

.song:hover{
background:#2c2c2c;
transform:scale(1.02);
}

.song-left{
display:flex;
align-items:center;
gap:15px;
}

.song-left img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

.song-name{
font-size:18px;
}

button{
background:#ff2e2e;
border:none;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff4a4a;
}

.slideshow{
margin-top:30px;
height:350px;
border-radius:15px;
overflow:hidden;
position:relative;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
opacity:0;
transition:opacity 1.5s;
}

.slideshow img.active{
opacity:1;
}

.player{
margin-top:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
Анари ❤️
</div>

<div class="song">

<div class="song-left">
<img src="/static/Screenshot from 2026-02-06 17-37-23.png">
<div class="song-name">Только для тебя</div>
</div>

<button onclick="playSong('Janaga - Нотами.mp3')">▶ Играть</button>

</div>

<div class="song">

<div class="song-left">
<img src="/static/Screenshot from 2026-02-17 22-37-28.png">
<div class="song-name">Моя любовь</div>
</div>

<button onclick="playSong('Strange - Малая.mp3')">▶ Играть</button>

</div>

<div class="slideshow">

<img src="/static/Screenshot from 2026-03-01 07-48-20.png" class="active">
<img src="/static/Screenshot from 2026-03-01 21-26-55.png">
<img src="/static/Screenshot from 2026-03-01 21-27-15.png">
<img src="/static/Screenshot from 2026-02-06 17-37-23.png">
<img src="/static/Screenshot from 2026-02-17 22-37-28.png">
<img src="/static/Screenshot from 2026-03-01 21-27-15.png">

</div>

<div class="player">

<audio id="audio" controls style="width:100%; margin-top:20px;"></audio>

</div>

</div>

<script>

let audio=document.getElementById("audio")

function playSong(song){

audio.src="/static/"+song
audio.play()

}

let slides=document.querySelectorAll(".slideshow img")

let index=0

setInterval(()=>{

slides[index].classList.remove("active")

index++

if(index>=slides.length){
index=0
}

slides[index].classList.add("active")

},3000)

</script>

</body>
</html>
