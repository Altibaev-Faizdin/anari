<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#000,#1a0000,#000);
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:40px;
font-size:40px;
animation:fade 2s ease;
}

p{
font-size:18px;
opacity:0.8;
animation:fade 3s ease;
}

.gallery{
margin-top:40px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.photo{
width:260px;
height:260px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,0,0,0.6);
transform:scale(0.9);
transition:0.4s;
animation:float 4s infinite ease-in-out;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform:scale(1.05);
box-shadow:0 0 50px red;
}

.controls{
margin-top:50px;
}

button{
padding:15px 35px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:red;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff2b2b;
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
top:0;
left:0;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<h1>Анари ❤️</h1>
<p>Эта песня только для тебя...</p>

<div class="gallery">

<div class="photo">
<img src="{{ url_for('static', filename='photo1.jpg') }}">
</div>

<div class="photo">
<img src="{{ url_for('static', filename='photo2.jpg') }}">
</div>

</div>

<div class="controls">

<button onclick="playMusic()">▶ Играть</button>

<button onclick="pauseMusic()">⏸ Остановить</button>

</div>

<audio id="music" loop>
<source src="{{ url_for('static', filename='song.mp3') }}" type="audio/mp3">
</audio>

<div class="hearts" id="hearts"></div>

<script>

let music=document.getElementById("music")

function playMusic(){
music.play()
}

function pauseMusic(){
music.pause()
}

function createHeart(){

let heart=document.createElement("div")
heart.classList.add("heart")

heart.innerHTML="❤"

heart.style.left=Math.random()*100+"%"

heart.style.animationDuration=(Math.random()*3+2)+"s"

document.getElementById("hearts").appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
