<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.header{
text-align:center;
padding:40px;
font-size:35px;
animation:fade 2s;
}

.container{
display:flex;
justify-content:center;
margin-top:20px;
}

.player{
width:700px;
background:#181818;
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(255,0,0,0.2);
}

.song{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-radius:10px;
transition:0.3s;
margin-bottom:10px;
}

.song:hover{
background:#262626;
transform:scale(1.02);
}

.song img{
width:60px;
height:60px;
border-radius:10px;
object-fit:cover;
}

.song-info{
display:flex;
align-items:center;
gap:15px;
}

.song-title{
font-size:18px;
}

.controls button{
background:red;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.controls button:hover{
background:#ff2b2b;
}

.slideshow{
margin-top:30px;
height:320px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 30px red;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
animation:slide 6s infinite;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>

</head>

<body>

<div class="header">
Анари ❤️
</div>

<div class="container">

<div class="player">

<h2>Мои песни для тебя</h2>

<div class="song">

<div class="song-info">
<img src="{{ url_for('static', filename='Screenshot from 2026-02-06 17-37-23.png') }}">
<div class="song-title">Песня 1</div>
</div>

<div class="controls">
<button onclick="playSong('song1.mp3')">▶</button>
<a href="{{ url_for('static', filename='Strange - Малая.mp3') }}" download>
<button>⬇</button>
</a>
</div>

</div>

<div class="song">

<div class="song-info">
<img src="{{ url_for('static', filename='Screenshot from 2026-02-17 22-37-28.png') }}">
<div class="song-title">Песня 2</div>
</div>

<div class="controls">
<button onclick="playSong('song2.mp3')">▶</button>
<a href="{{ url_for('static', filename='Strange - Малая.mp3') }}" download>
<button>⬇</button>
</a>
</div>

</div>

<div class="slideshow">
<img id="slide">
</div>

</div>

</div>

<audio id="player"></audio>

<script>

let player=document.getElementById("player")

function playSong(song){
player.src="/static/"+song
player.play()
}

let images=[
"/static/Screenshot from 2026-02-17 22-37-28.png",
"/static/Screenshot from 2026-02-17 22-37-28.png",
"/static/Screenshot from 2026-02-17 22-37-28.png"
]

let i=0

function slideshow(){

document.getElementById("slide").src=images[i]

i++

if(i>=images.length){
i=0
}

}

setInterval(slideshow,3000)

slideshow()

</script>

</body>
</html>
